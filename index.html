<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/ASSET_TF_FRONTEND/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="asset_tf — Smart Asset Management">

  <!-- Prevent browsers from caching index.html so new deploys are always picked up -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="asset_tf">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>asset_tf</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0D0D0D;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0D0D0D;
      transition: opacity 0.5s ease;
    }

    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      animation: splash-pulse 2s ease-in-out infinite;
    }

    #splash-name {
      margin-top: 20px;
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #splash-loader {
      margin-top: 48px;
      display: flex;
      gap: 8px;
    }

    #splash-loader span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #FFFFFF55;
      animation: splash-dot 1.2s ease-in-out infinite;
    }

    #splash-loader span:nth-child(2) { animation-delay: 0.2s; }
    #splash-loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes splash-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.75; transform: scale(0.96); }
    }

    @keyframes splash-dot {
      0%, 80%, 100% { background-color: #FFFFFF22; transform: scale(0.8); }
      40%            { background-color: #FFFFFFFF; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <img id="splash-logo" src="logo.png" alt="asset_tf logo" />
    <p id="splash-name">asset_tf</p>
    <div id="splash-loader">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
